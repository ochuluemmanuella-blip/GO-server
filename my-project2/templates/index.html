<!DOCTYPE html>
		<html lang="en">
			<head>
			<title>Ascii Art Generator</title>
			<style>
				body {
					font-family: monospace;
					background-color: whitesmoke;
					color: #222;
					max-width: 800px;
					margin: 40px auto;
					padding: 20px;
					transition: background-color 0.3s, color 0.3s;
				}

				body.dark {
					background-color: #1a1a1a;
					color: #e0e0e0;
				}

				h1 {
					font-size: 2rem;
					margin-bottom: 5px;
				}

				input[type="text"] {
					width: 100%;
					padding: 10px;
					font-size: 1rem;
					border: 1px solid #ccc;
					box-sizing: border-box;
					background-color: inherit;
					color: inherit;
				}
				select {
					padding: 10px;
					font-size: 1rem;
					border: 1px solid #ccc;
					border-radius: 4px;
					background-attachment: inherit;
					color: inherit;
				}
				button[type="submit"] {
					padding: 10px 24px;
					font-size: 1rem;
					background-color: #4a90e2;
					color: white;
					border: none;
					border-radius: 4px;
					cursor: pointer;
					margin-top: 16px;
				}
				button[type="submit"]:hover {
					background-color: #357abd;
				}
				#dark-toggle {
					float: right;
					padding: 8px 16px;
					font-size: 0.9rem;
					cursor: pointer;
					border: 1px solid #ccc;
					border-radius: 4px;
					background-color: inherit;
					color: inherit;
				}
				pre {
					background-color: #e8e8e8;
					padding: 20px;
					border-radius: 6px;
					overflow-x: auto;
					font-size: 0.85rem;
					line-height: 1.2;
					margin-top: 30px;
				}
				body.dark pre {
					background-color: #2a2a2a;
				}
			</style>
			</head>
			<body>
				<button id="dark-toggle" onclick="toggleDark()">🌙 Dark Mode</button>
			<h1>ASCII Art </h1>
            			<p>Welcome! This tool converts text into ASCII art.</p>


<form action="/ascii-art" method="POST">
            <input  type="text" name="text" placeholder="Enter your text here" maxlength="100">

            <br><br>
            <select name="banner"> 
				<option value="">-- Chooose a banner --</option>
				<option value="standard">Standard</option>
				<option value="shadow">Shadow</option>
				<option value="thinkertoy">Thinkertoy</option>
				</select>

            <br><br>

<button type="submit">Generate</button>

            </form>
			{{if .Result}}
<pre>{{.Result}}</pre>
{{end}}
<script>
	function toggleDark() {
		document.body.classList.toggle('dark');
		const btn = document.getElementById('dark-toggle');
		btn.textContent = document.body.classList.contains('dark')
		? '☀️ Light Mode' 
        : '🌙 Dark Mode';
	}
</script>
			</body>
			</html>
